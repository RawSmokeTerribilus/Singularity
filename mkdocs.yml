site_name: "RaW Suite: Singularity"
site_description: "Automatización total para la gestión de medios y trackers UNIT3D"
site_author: "RaW Team"

theme:
  name: material
  language: es
  palette:
    - scheme: slate  # Modo oscuro por defecto, muy "hacker"
      primary: cyan
      accent: cyan
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy

nav:
  - Inicio: index.md
  - Instalación y Configuración: setup.md
  - Singularity Mode: singularity_mode.md
  - Módulos Principales:
      - MKVerything: mkverything.md
      - RawLoadrr: rawloadrr.md
      - UNIT3D Orchestrator: unit3d_orchestrator.md
  - Dashboard Web: dashboard.md
  - Utilidades Extras: extras.md
  - Notas Técnicas: technical_notes.md
  - Wiki RawLoadrr (ES):
      - Inicio: rawloadrr_wiki/Home.md
      - Guía de Argumentos: rawloadrr_wiki/Arguments-User-Guide.md
      - Configuración Completa: rawloadrr_wiki/Full-Config-Guide.md
      - Configuración Interactiva: rawloadrr_wiki/Interactive-Config.md
      - Edición Masiva: rawloadrr_wiki/Mass-Edition.md
      - Grupos Prohibidos: rawloadrr_wiki/Banned-Groups.md
      - Contenidos Prohibidos: rawloadrr_wiki/Content-Bans.md
  - Wiki MKVerything (ES):
      - Inicio: mkverything_wiki/Home.md
      - Auditoría de Binarios: mkverything_wiki/Binary-Audit.md
      - Arquitectura: mkverything_wiki/Architecture.md
      - Guía de Módulos: mkverything_wiki/Modules-Guide.md
      - Deep Dive Verificador: mkverything_wiki/Verifier-Deep-Dive.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
